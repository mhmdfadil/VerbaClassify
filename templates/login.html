{% extends "base.html" %}
{% block title %}Login Admin — VerbaClassify{% endblock %}

{% block extra_head %}
<style>
.login-wrap {
  min-height: calc(100vh - 130px);
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
  background: linear-gradient(135deg, var(--sky-50) 0%, var(--sky-100) 100%);
}
.login-card {
  background: white; border-radius: var(--radius-xl);
  border: 1.5px solid var(--sky-200);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 440px;
  overflow: hidden;
}
.login-header {
  background: linear-gradient(135deg, var(--sky-800), var(--sky-900));
  padding: 2.5rem 2rem; text-align: center; color: white;
}
.login-logo {
  width: 56px; height: 56px;
  background: rgba(255,255,255,.15);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem; margin: 0 auto 1rem;
  border: 1.5px solid rgba(255,255,255,.2);
}
.login-header h1 { font-family: var(--font-display); font-size: 1.75rem; font-weight: 600; }
.login-header p { font-size: .82rem; opacity: .7; margin-top: .35rem; }
.login-body { padding: 2.5rem 2rem; }
.login-footer { padding: 0 2rem 2rem; text-align: center; font-size: .8rem; color: var(--slate-400); }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🔐</div>
      <h1>Admin Panel</h1>
      <p>VerbaClassify — ID3 Modifikasi</p>
    </div>
    <div class="login-body">
      {% if error %}
      <div class="alert alert-danger" style="margin-bottom:1.25rem;">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="Masukkan username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Masukkan password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">
          Masuk ke Dashboard
        </button>
      </form>
    </div>
    <div class="login-footer">
      <a href="{{ url_for('index') }}" style="color:var(--sky-600);text-decoration:none">← Kembali ke Beranda</a>
    </div>
  </div>
</div>
{% endblock %}
